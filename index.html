<style>
/* ─── THEME TOKENS ─── */
:root {
  --bg: #1c1920;
  --blob1: #3a1d2c; --blob2: #281c38; --blob3: #351625; --blob4: #2a1832;
  --acc: #fc9faf; --acc2: rgba(252,159,175,.78); --acc-dim: rgba(252,159,175,.13);
  --ring-c: rgba(252,159,175,.1); --sym-c: rgba(252,159,175,.38);
  --text: #fdf0f6; --text2: rgba(253,240,246,.52); --text3: rgba(253,240,246,.26);
  --link-border: rgba(252,159,175,.14); --link-hover: rgba(252,159,175,.1);
}
[data-theme="light"] {
  --bg: #fef4f7;
  --blob1: #ffd8e4; --blob2: #f8cad8; --blob3: #fde0ea; --blob4: #f4d0de;
  --acc: #c95070; --acc2: rgba(201,80,112,.78); --acc-dim: rgba(201,80,112,.1);
  --ring-c: rgba(201,80,112,.12); --sym-c: rgba(201,80,112,.22);
  --text: #2e1220; --text2: rgba(46,18,32,.52); --text3: rgba(46,18,32,.28);
  --link-border: rgba(201,80,112,.14); --link-hover: rgba(201,80,112,.08);
}

/* ─── RESET ─── */
* { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent;}
html, body { height: 100%; width: 100%; }
body {
  min-height: 100vh;
  background: var(--bg);
  color: var(--text);
  font-family: 'Fredoka', sans-serif;
  font-weight: 400;
  display: flex; align-items: center; justify-content: center;
  overflow: hidden;
  position: relative;
}

/* ─── BACKGROUND BLOBS (mouse parallax via JS) ─── */
.blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  will-change: transform;
}
.b1 { width: 580px; height: 580px; background: var(--blob1); opacity: .72; top: -140px; left: -120px; }
.b2 { width: 440px; height: 440px; background: var(--blob2); opacity: .62; bottom: -100px; right: -100px; }
.b3 { width: 320px; height: 320px; background: var(--blob3); opacity: .52; top: 35%; left: 48%; }
.b4 { width: 210px; height: 210px; background: var(--blob4); opacity: .48; bottom: 8%; left: 6%; }
.b5 { width: 180px; height: 180px; background: var(--blob1); opacity: .38; top: 9%; right: 9%; }

/* ─── DECORATIVE RINGS (mouse parallax via JS) ─── */
.deco-circles { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
.circle {
  position: absolute; border-radius: 50%;
  border: 1px solid var(--ring-c);
  will-change: transform;
}
.c1  { width: 520px; height: 520px; top: -110px; right: -110px; }
.c2  { width: 360px; height: 360px; bottom: 30px; left: -90px; }
.c3  { width: 200px; height: 200px; top: 22%; right: 8%; }
.c4  { width: 110px; height: 110px; top: 13%; left: 13%; }
.c5  { width: 64px;  height: 64px;  bottom: 18%; right: 22%; }
.c6  { width: 34px;  height: 34px;  top: 58%; left: 7%; }
.c7  { width: 82px;  height: 82px;  bottom: 28%; left: 28%; }
.c8  { width: 44px;  height: 44px;  top: 38%; left: 4%; }
.c9  { width: 150px; height: 150px; bottom: 12%; right: 5%; }
.c10 { width: 26px;  height: 26px;  top: 70%; right: 35%; }

/* ─── FLOATING HEARTS & STARS (mouse parallax via JS) ─── */
.floats { position: fixed; inset: 0; pointer-events: none; z-index: 1; }
.f {
  position: absolute;
  color: var(--sym-c);
  line-height: 1;
  user-select: none;
  will-change: transform;
}

/* ─── CONTROLS (top-right buttons) ─── */
.controls {
  position: fixed; top: 1.2rem; right: 1.4rem; z-index: 50;
  display: flex; gap: .5rem;
}
.ctrl {
  background: transparent;
  border: 1px solid var(--ring-c);
  border-radius: 20px; padding: .28rem .8rem;
  color: var(--text3); font-family: 'Fredoka', sans-serif; font-weight: 500;
  font-size: .8rem; cursor: pointer; letter-spacing: .04em;
  transition: color .2s, border-color .2s;
}
.ctrl:hover { border-color: var(--acc2); color: var(--acc); }

/* ─── MAIN CONTENT ─── */
.content {
  position: relative; z-index: 10;
  text-align: center;
  display: flex; flex-direction: column; align-items: center;
  padding: 2rem;
}
.greeting {
  font-weight: 300; font-size: 1rem; color: var(--text3);
  letter-spacing: .18em; margin-bottom: .6rem;
}
.name {
  font-family: 'Bubblegum Sans', cursive;
  font-size: clamp(3rem, 10vw, 5.5rem);
  color: var(--text); line-height: 1;
  letter-spacing: .02em; margin-bottom: .5rem;
}
.role {
  font-size: 1.05rem; color: var(--acc);
  letter-spacing: .1em; margin-bottom: 2rem; opacity: .85;
}
.bio {
  font-size: 1rem; color: var(--text2);
  line-height: 1.9; max-width: 420px;
  font-weight: 300; margin-bottom: .6rem;
}
.bio strong { color: var(--acc2); font-weight: 500; }
.note {
  font-size: .75rem; color: var(--text3);
  letter-spacing: .06em; margin-bottom: 2.4rem; line-height: 1.8;
}

/* ─── LINKS ─── */
.links { display: flex; justify-content: center; gap: .7rem; flex-wrap: wrap; }
.link {
  display: flex; align-items: center; gap: .5rem;
  text-decoration: none; color: var(--text2);
  font-size: .88rem; font-weight: 500;
  padding: .45rem 1rem; border-radius: 30px;
  border: 1px solid var(--link-border);
  transition: color .2s, border-color .2s, background .2s, transform .2s;
}
.link:hover {
  color: var(--acc); border-color: var(--acc2);
  background: var(--link-hover); transform: translateY(-2px);
}
.link svg { width: 15px; height: 15px; flex-shrink: 0; opacity: .9; }

.heart-deco {
  margin-top: 2.2rem; font-size: .8rem;
  color: var(--acc); opacity: .38; letter-spacing: .3em;
}

/* ─── RUSSIAN FONT OVERRIDES ─── */
body.ru .bio, body.ru .note, body.ru .role,
body.ru .greeting, body.ru .link {
  font-family: 'Nunito', sans-serif;
}
body.ru .bio  { font-size: .9rem; }
body.ru .note { font-size: .72rem; }
body.ru .role { font-size: .96rem; letter-spacing: .06em; }
body.ru .greeting { font-size: .85rem; }
</style>

<script>
(function () {

  /* ─────────────────────────────────
     TRANSLATIONS
     To edit text: change the values below.
     ───────────────────────────────── */
  var T = {
    en: {
      greeting  : 'hello, i\'m',
      role      : 'backend developer \u2726',
      // English bio — edit here
      bio       : 'I work with <strong>Go</strong> and <strong>Elixir</strong>.<br/>I won\'t stop until everything works as it should<br/>and until I figure it all out. \u2661',
      note      : 'pet projects i\'m proud of \u00b7 junior \u00b7 always learning<br/>next up: rust \u00b7 c# \u00b7 security in dev',
      lbtn      : 'RU',
      tbtn_dark : '\u2600 light',
      tbtn_light: '\u263d dark'
    },
    ru: {
      greeting  : '\u043f\u0440\u0438\u0432\u0435\u0442, \u044f',
      role      : '\u0431\u044d\u043a\u044d\u043d\u0434-\u0440\u0430\u0437\u0440\u0430\u0431\u043e\u0442\u0447\u0438\u043a \u2726',
      // Russian bio — edit here
      bio       : '\u042f \u0440\u0430\u0431\u043e\u0442\u0430\u044e \u043d\u0430 <strong>Go</strong> \u0438 <strong>Elixir</strong>.<br/>\u041d\u0435 \u043e\u0441\u0442\u0430\u043d\u0430\u0432\u043b\u0438\u0432\u0430\u044e\u0441\u044c, \u043f\u043e\u043a\u0430 \u0432\u0441\u0451 \u043d\u0435 \u0440\u0430\u0431\u043e\u0442\u0430\u0435\u0442 \u043a\u0430\u043a \u043d\u0430\u0434\u043e,<br/>\u0438 \u043f\u043e\u043a\u0430 \u044f \u0432\u043e \u0432\u0441\u0451\u043c \u043d\u0435 \u0440\u0430\u0437\u0431\u0435\u0440\u0443\u0441\u044c. \u2661',
      note      : '\u0435\u0441\u0442\u044c \u043a\u0440\u0443\u0442\u044b\u0435 \u043f\u0440\u043e\u0435\u043a\u0442\u044b \u00b7 \u0434\u0436\u0443\u043d \u00b7 \u0443\u0447\u0443\u0441\u044c \u043f\u043e\u0441\u0442\u043e\u044f\u043d\u043d\u043e<br/>\u0432 \u043f\u043b\u0430\u043d\u0430\u0445: rust \u00b7 c# \u00b7 \u0431\u0435\u0437\u043e\u043f\u0430\u0441\u043d\u043e\u0441\u0442\u044c \u0432 \u0440\u0430\u0437\u0440\u0430\u0431\u043e\u0442\u043a\u0435',
      lbtn      : 'EN',
      tbtn_dark : '\u2600 light',
      tbtn_light: '\u263d dark'
    }
  };

  var lang  = 'en';
  var theme = 'dark';

  /* ─────────────────────────────────
     FLOATING SYMBOLS
     Change count (55) or symbol mix as needed.
     ───────────────────────────────── */
  var syms = ['\u2661', '\u2726', '\u2661', '\u2726', '\u2726', '\u2661', '\u2726', '\u2661'];
  var fc   = document.getElementById('floats');
  var floatEls = [];

  for (var i = 0; i < 55; i++) {
    var d = document.createElement('div');
    d.className  = 'f';
    d.textContent = syms[Math.floor(Math.random() * syms.length)];
    d.style.left     = (Math.random() * 100) + '%';
    d.style.top      = (Math.random() * 100) + '%';
    d.style.opacity  = (0.05 + Math.random() * 0.28).toFixed(2);
    d.style.fontSize = (7 + Math.random() * 15) + 'px';
    // Each float gets its own parallax speed
    d.dataset.speed  = (0.02 + Math.random() * 0.06).toFixed(3);
    fc.appendChild(d);
    floatEls.push(d);
  }

  /* ─────────────────────────────────
     MOUSE PARALLAX
     Increase speed values in HTML data-speed attrs
     for stronger movement, decrease for subtler.
     ───────────────────────────────── */
  var cx = window.innerWidth  / 2;
  var cy = window.innerHeight / 2;
  var mx = cx, my = cy;   // smoothed mouse
  var tx = cx, ty = cy;   // raw mouse target

  var blobs   = document.querySelectorAll('.blob');
  var circles = document.querySelectorAll('.circle');

  window.addEventListener('resize', function () {
    cx = window.innerWidth  / 2;
    cy = window.innerHeight / 2;
  });

  document.addEventListener('mousemove', function (e) {
    tx = e.clientX;
    ty = e.clientY;
  });

  function lerp(a, b, t) { return a + (b - a) * t; }

  (function tick() {
    mx = lerp(mx, tx, 0.07);
    my = lerp(my, ty, 0.07);
    var dx = mx - cx;
    var dy = my - cy;

    blobs.forEach(function (el) {
      var s = parseFloat(el.dataset.speed) || 0.02;
      el.style.transform = 'translate(' + (dx * s).toFixed(2) + 'px,' + (dy * s).toFixed(2) + 'px)';
    });

    circles.forEach(function (el) {
      var s = parseFloat(el.dataset.speed) || 0.02;
      el.style.transform = 'translate(' + (dx * s).toFixed(2) + 'px,' + (dy * s).toFixed(2) + 'px)';
    });

    floatEls.forEach(function (el) {
      var s = parseFloat(el.dataset.speed) || 0.04;
      el.style.transform = 'translate(' + (dx * s).toFixed(2) + 'px,' + (dy * s).toFixed(2) + 'px)';
    });

    requestAnimationFrame(tick);
  }());

  /* ─────────────────────────────────
     LANGUAGE TOGGLE
     ───────────────────────────────── */
  document.getElementById('lbtn').addEventListener('click', function () {
    lang = lang === 'en' ? 'ru' : 'en';
    var t = T[lang];
    document.getElementById('greeting').textContent = t.greeting;
    document.getElementById('role').textContent     = t.role;
    document.getElementById('bio').innerHTML        = t.bio;
    document.getElementById('note').innerHTML       = t.note;
    document.getElementById('lbtn').textContent     = t.lbtn;
    document.documentElement.lang = lang;
    document.body.classList.toggle('ru', lang === 'ru');
  });

  /* ─────────────────────────────────
     THEME TOGGLE
     ───────────────────────────────── */
  document.getElementById('tbtn').addEventListener('click', function () {
    theme = theme === 'dark' ? 'light' : 'dark';
    document.body.dataset.theme = theme;
    document.getElementById('tbtn').textContent =
      theme === 'dark' ? T[lang].tbtn_dark : T[lang].tbtn_light;
  });

}());
</script>
